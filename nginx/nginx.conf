worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Hide nginx version
    server_tokens off;

    # ─── Rate Limiting Zones ───────────────────────────────────────────
    # Login endpoint: 5 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # General API: 30 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ─── Gzip Compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ─── Upstream ──────────────────────────────────────────────────────
    upstream nextjs {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;

        # ─── Security Headers ─────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://utfs.io https://*.uploadthing.com https://files.commonsku.com https://*.commonsku.com https://*.fourthwall.com https://cdn.fourthwall.com; font-src 'self' data:; connect-src 'self' https://utfs.io https://*.uploadthing.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ─── Block Common Attack Paths ─────────────────────────────────
        location ~ /\.env {
            deny all;
            return 404;
        }

        location ~ /\.git {
            deny all;
            return 404;
        }

        location ~ /wp-admin {
            deny all;
            return 404;
        }

        location ~ /wp-login {
            deny all;
            return 404;
        }

        location ~ /xmlrpc\.php {
            deny all;
            return 404;
        }

        location ~ /phpmyadmin {
            deny all;
            return 404;
        }

        location ~ /\.ht {
            deny all;
            return 404;
        }

        # ─── Rate Limited: Login ───────────────────────────────────────
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Rate Limited: API ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ─── Cache Static Assets ──────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── Default: Proxy to Next.js ─────────────────────────────────
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
